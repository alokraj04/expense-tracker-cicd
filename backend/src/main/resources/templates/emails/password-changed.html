<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,sans-serif;">
<div style="max-width:600px;margin:40px auto;background:white;border-radius:10px;overflow:hidden;border:1px solid #e8e8e8;">

    <div style="background:#38A169;padding:32px;text-align:center;">
        <h1 style="color:white;margin:0;font-size:26px;" th:text="${appName}"></h1>
    </div>

    <div style="padding:36px;">
        <h2 style="color:#1a1a1a;margin-top:0;">Password changed successfully ✓</h2>
        <p style="color:#555;line-height:1.6;">Hi <strong th:text="${name}"></strong>,</p>
        <p style="color:#555;line-height:1.6;">
            Your password was successfully changed.
            If this was you, no further action is needed.
        </p>
        <div style="background:#FFF5F5;border:1px solid #FED7D7;border-radius:6px;padding:20px;margin-top:24px;">
            <p style="color:#C53030;font-size:13px;font-weight:bold;margin:0 0 8px 0;">
                Wasn't you?
            </p>
            <p style="color:#C53030;font-size:13px;margin:0 0 16px 0;line-height:1.6;">
                If you did not make this change, your account may be compromised.
                Please contact support immediately.
            </p>
            <div style="text-align:center;">
                <a th:href="${supportUrl}"
                   style="background:#E53E3E;color:white;padding:10px 24px;
                  border-radius:6px;text-decoration:none;font-weight:bold;font-size:13px;">
                    Contact Support
                </a>
            </div>
        </div>
    </div>

    <div style="background:#f9f9f9;padding:20px;text-align:center;border-top:1px solid #eee;">
        <p style="color:#aaa;font-size:12px;margin:0;"
           th:text="'© 2026 ' + ${appName} + '. All rights reserved.'"></p>
    </div>

</div>
</body>
</html>
